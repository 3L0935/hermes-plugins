name: deep_research
version: "1.0.0"
description: >
  Iterative multi-source deep research tool. Search-agnostic core that works
  with any Hermes web search backend (SearXNG, Firecrawl, Tavily, Brave).
  Auto-discovers addons (firecrawl crawl, browser scraping) at runtime.
  Returns raw structured markdown — no LLM summarization that truncates content.
author: hermes-plugins
kind: standalone
provides_tools:
  - deep_research
